<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Anthology — Essays on politics, economics, society, and technology.">
  <title>Anthology</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page--front">

<div class="container">

  <header class="masthead">
    <div class="masthead__top-bar">
      <span>Est. 2026</span>
      <span id="masthead-date"></span>
    </div>
    <a href="/" class="masthead__wordmark">Anthology</a>
    <p class="masthead__tagline">Essays on politics, economics, society, and technology</p>
    <hr class="masthead__rule">
  </header>

  <nav class="section-nav">
    <a href="#notes">Notes</a>
    <a href="#essays">Essays</a>
    <a href="#dispatches">Dispatches</a>
    <a href="about.html">About</a>
    <a href="/login.html" id="auth-nav-link">Sign in</a>
  </nav>

  <main>

    <!-- Edition view: shown when authenticated and edition.json is available -->
    <section id="edition" style="display:none">
      <div id="edition-content"></div>
    </section>

    <!-- Catalog view: section-by-section feed -->
    <div id="catalog-view">

      <section id="notes">
        <h2 class="section-header">Notes</h2>
        <ul class="note-list" id="notes-list"></ul>
      </section>

      <section id="essays">
        <h2 class="section-header">Essays</h2>
        <ul class="essay-list" id="essays-list"></ul>
      </section>

      <section id="dispatches">
        <h2 class="section-header">Dispatches</h2>
        <ul class="dispatch-list" id="dispatches-list"></ul>
      </section>

    </div>

  </main>

  <footer class="site-footer">
    <p>Anthology &copy; 2026</p>
  </footer>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth/auth.js"></script>

<script>
  // ── Masthead date ─────────────────────────────────────────────────────────
  const dateEl = document.getElementById('masthead-date');
  if (dateEl) {
    dateEl.textContent = new Date().toLocaleDateString('en-GB', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  }

  // ── Auth nav ──────────────────────────────────────────────────────────────
  _supabase.auth.onAuthStateChange((_event, session) => updateAuthNav(session));

  // ── Content feed ──────────────────────────────────────────────────────────

  // Tokenize a free-text interests string into a lowercase word set.
  // Strips punctuation; splits on whitespace and commas.
  function tokenize(str) {
    if (!str) return new Set();
    return new Set(
      str.toLowerCase()
         .replace(/[^a-z0-9\s]/g, ' ')
         .split(/\s+/)
         .filter(w => w.length > 2)
    );
  }

  // Score a catalog piece against the user's interest tokens.
  // Returns the number of keyword matches.
  function score(piece, interestTokens) {
    if (!interestTokens || interestTokens.size === 0) return 0;
    let hits = 0;
    for (const kw of (piece.keywords || [])) {
      const kwTokens = tokenize(kw);
      for (const t of kwTokens) {
        if (interestTokens.has(t)) { hits++; break; }
      }
    }
    return hits;
  }

  // Sort pieces: by score desc, then date desc.
  function sortPieces(pieces, interestTokens) {
    return pieces.slice().sort((a, b) => {
      const scoreDiff = score(b, interestTokens) - score(a, interestTokens);
      if (scoreDiff !== 0) return scoreDiff;
      return (b.date || '').localeCompare(a.date || '');
    });
  }

  // ── Section label helper ──────────────────────────────────────────────────

  function sectionLabel(p) {
    const sec = p.section || p.type || '';
    if (sec === 'dispatches') return p.dispatch_type === 'weekly' ? 'Weekly Dispatch' : 'Daily Dispatch';
if (sec === 'notes')       return 'Note';
    if (sec === 'essays')      return 'Essay';
    return sec;
  }

  // ── Edition renderer ──────────────────────────────────────────────────────

  function renderEdition(ed) {
    const lead = ed.lead;
    const secondary = ed.secondary || [];
    const further = ed.further_reading || [];

    const leadHtml = `
      <div class="edition-lead">
        <div class="edition-lead__label">${sectionLabel(lead)}</div>
        <h2 class="edition-lead__title"><a href="${lead.url}">${lead.title}</a></h2>
        <p class="edition-lead__standfirst">${lead.standfirst}</p>
        <a class="edition-lead__read" href="${lead.url}">Read &rarr;</a>
      </div>`;

    const secondaryHtml = secondary.length
      ? `<hr class="edition-rule">
         <div class="edition-secondary">
           ${secondary.map(p => `
             <div class="edition-secondary__item">
               <div class="edition-secondary__label">${sectionLabel(p)}</div>
               <h3 class="edition-secondary__title"><a href="${p.url}">${p.title}</a></h3>
               <p class="edition-secondary__standfirst">${p.standfirst}</p>
             </div>`).join('')}
         </div>`
      : '';

    const furtherHtml = further.length
      ? `<hr class="edition-rule">
         <div class="edition-further">
           <h3 class="edition-further__header">Further Reading</h3>
           <ul class="edition-further__list">
             ${further.map(p => `
               <li class="edition-further__item">
                 <span class="edition-further__label">${sectionLabel(p)}</span>
                 <a href="${p.url}" class="edition-further__link">${p.title}</a>
                 <span class="edition-further__standfirst">${p.standfirst}</span>
               </li>`).join('')}
           </ul>
         </div>`
      : '';

    return `
      <div class="edition-dateline">${ed.date_display || ''}</div>
      ${leadHtml}
      ${secondaryHtml}
      ${furtherHtml}
      <hr class="edition-rule">
      <p class="edition-browse-all">
        <a href="#notes">Browse all Notes</a> &middot;
        <a href="#essays">Browse all Essays</a> &middot;
        <a href="#dispatches">Browse all Dispatches</a>
      </p>`;
  }

  // ── Item renderers ────────────────────────────────────────────────────────

  function renderNote(p) {
    return `<li class="note-item">
      <div class="note-item__meta">${p.date_display || p.date}</div>
      <h2 class="note-item__title">
        <a href="${p.url}">${p.title}</a>
      </h2>
      <p class="note-item__standfirst">${p.standfirst}</p>
    </li>`;
  }

  function renderEssay(p) {
    return `<li class="essay-item">
      <div class="essay-item__meta">${p.date_display || p.date}</div>
      <h2 class="essay-item__title">
        <a href="${p.url}">${p.title}</a>
      </h2>
      <p class="essay-item__standfirst">${p.standfirst}</p>
      <a class="essay-item__read" href="${p.url}">Read essay</a>
    </li>`;
  }

  function renderDispatch(p) {
    const typeLabel = p.dispatch_type === 'weekly' ? 'Weekly Dispatch' : 'Daily Dispatch';
    const meta = `${p.date_display || p.date} &middot; ${typeLabel}`;
    return `<li class="dispatch-item">
      <div class="dispatch-item__meta">${meta}</div>
      <h2 class="dispatch-item__title">
        <a href="${p.url}">${p.title}</a>
      </h2>
      <p class="dispatch-item__standfirst">${p.standfirst}</p>
      <a class="dispatch-item__read" href="${p.url}">Read dispatch</a>
    </li>`;
  }

// ── Main render ───────────────────────────────────────────────────────────

  function renderSection(listId, pieces, renderFn, interestTokens) {
    const el = document.getElementById(listId);
    if (!el) return;
    if (pieces.length === 0) {
      el.innerHTML = '';
      return;
    }
    const sorted = sortPieces(pieces, interestTokens);
    el.innerHTML = sorted.map(renderFn).join('\n');
  }

  async function buildFeed() {
    // Get session first so we can attempt per-user catalog
    const { data: { session } } = await _supabase.auth.getSession();

    // Fetch catalog — prefer per-user catalog when authenticated
    let catalog;
    try {
      let catalogUrl = '/shared-catalog.json';
      if (session?.user?.id) {
        const perUserUrl = `/users/${session.user.id}/content-catalog.json`;
        try {
          const perUserResp = await fetch(perUserUrl);
          if (perUserResp.ok) {
            catalog = await perUserResp.json();
          }
        } catch (_) { /* fall through to shared catalog */ }
      }
      if (!catalog) {
        const resp = await fetch(catalogUrl);
        catalog = await resp.json();
      }
    } catch (e) {
      console.error('Failed to load content catalog:', e);
      return;
    }

    const pieces = catalog.pieces || [];

    const interestTokens = session
      ? tokenize(session.user?.user_metadata?.reading_interests || '')
      : new Set();

    // ── Attempt to load edition.json when authenticated ───────────────────
    if (session?.user?.id) {
      const edContent = document.getElementById('edition-content');
      const edSection  = document.getElementById('edition');
      try {
        const edResp = await fetch(`/users/${session.user.id}/edition.json`);
        if (edResp.ok) {
          const edition = await edResp.json();
          if (edContent && edSection) {
            edContent.innerHTML = renderEdition(edition);
            edSection.style.display = '';
          }
        } else if (edContent && edSection) {
          // Edition not yet generated — show a meaningful empty state rather
          // than leaving #edition silently hidden.
          const hasInterests = !!(session.user?.user_metadata?.reading_interests?.trim());
          edContent.innerHTML = hasInterests
            ? `<div class="edition-preparing">
                 <p class="edition-preparing__message">Your personalised edition is being prepared. Check back later today.</p>
               </div>`
            : `<div class="edition-preparing">
                 <p class="edition-preparing__message">Set your reading interests and Anthology will build an edition just for you.</p>
                 <a class="edition-preparing__link" href="/account.html">Set interests &rarr;</a>
               </div>`;
          edSection.style.display = '';
        }
      } catch (_) { /* network error — catalog view remains primary */ }
    }

    // ── Catalog view (always populated; shown below edition when auth'd) ──

    // Partition by section
    const bySection = {};
    for (const p of pieces) {
      const sec = p.section || p.type;
      if (!bySection[sec]) bySection[sec] = [];
      bySection[sec].push(p);
    }

    // Dispatch content
    const allDispatches = [
      ...(bySection['dispatches'] || []).map(p => ({ ...p, _renderer: renderDispatch })),
    ];

    renderSection('notes-list',      bySection['notes']  || [], renderNote,  interestTokens);
    renderSection('essays-list',     bySection['essays'] || [], renderEssay, interestTokens);

    // Dispatches section: all dispatch types, each rendered with its own renderer
    const dispatchEl = document.getElementById('dispatches-list');
    if (dispatchEl) {
      if (allDispatches.length === 0) {
        dispatchEl.innerHTML = '';
      } else {
        const sorted = sortPieces(allDispatches, interestTokens);
        dispatchEl.innerHTML = sorted.map(p => p._renderer(p)).join('\n');
      }
    }
  }

  buildFeed();
</script>

</body>
</html>
